<!-- Inventory management module for supply chain system -->

<!DOCTYPE html>
<html>
<head>

<title>Inventory System</title>

<link rel="stylesheet" href="bootstrap.min.css">
<script src="bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:#f5f7fb;
}
table{
background:white;
}
</style>

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container-fluid">

<a href="export_report.php" class="btn btn-success">
Export Report
</a>

<h3 class="text-white mx-auto"><b>Inventory</b></h3>

<button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#productModal">
Add Product
</button>

</div>

</nav>


<div class="container mt-4">

<!-- DASHBOARD -->

<div class="row text-center mb-4">

<div class="col-md-4">
<div class="card bg-primary text-white">
<div class="card-body">
<h5>Total Products</h5>
<h2 id="totalProducts">0</h2>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card bg-danger text-white">
<div class="card-body">
<h5>Low Stock Items</h5>
<h2 id="lowStock">0</h2>
</div>
</div>
</div>

<div class="col-md-4">
<div class="card bg-success text-white">
<div class="card-body">
<h5>Total Stock</h5>
<h2 id="totalStock">0</h2>
</div>
</div>
</div>

</div>


<!-- CHART -->

<div class="card mb-4">
<div class="card-body">

<h5 class="text-center mb-3">Stock Analytics</h5>

<canvas id="stockChart"></canvas>

</div>
</div>

<button class="btn btn-danger mb-3" onclick="showLowStock()">
Show Low Stock Products
</button>
<!-- SEARCH -->

<input
type="text"
id="search"
class="form-control mb-3"
placeholder="Search product by name or category">

<!-- SEARCH RESULT -->

<div id="searchResult"></div>


<!-- TABLE -->

<table class="table table-bordered table-striped">

<thead class="table-dark">

<tr>

<th>ID</th>
<th>Name</th>
<th>Category</th>
<th>Price</th>
<th>Quantity</th>
<th>Status</th>
<th>Updated</th>
<th>Actions</th>

</tr>

</thead>

<tbody id="productTable"></tbody>

</table>

</div>


<!-- ADD PRODUCT MODAL -->

<div class="modal fade" id="productModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">
<h5>Add Product</h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<form id="productForm">

<input type="hidden" id="productId" name="id">

<input id="name" name="name" class="form-control mb-2" placeholder="Product Name" required>

<input id="category" name="category" class="form-control mb-2" placeholder="Category" required>

<input id="price" name="price" type="number" class="form-control mb-2" placeholder="Price" required>

<input id="quantity" name="quantity" type="number" class="form-control mb-2" placeholder="Quantity" required>

<button class="btn btn-primary w-100">
Add / Update Product
</button>

</form>
</div>

</div>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
